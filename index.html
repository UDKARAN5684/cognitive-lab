<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#B83C2B">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='14' fill='%23EFF6FF'/%3E%3Cpath d='M14 28c0-7.3 5.5-12.6 12.5-12.6 4.7 0 8.3 2.2 10.3 5.5M14 28c0 5.8 4.3 9.6 10 9.6 4 0 6.9-1.6 9.2-4.3M19.5 26.2h5.5l2.5-5 3.7 10.6 2.4-5.6h4' fill='none' stroke='%232563EB' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='14' cy='28' r='2.7' fill='%2360A5FA'/%3E%3Ccircle cx='38' cy='26.2' r='2.7' fill='%2360A5FA'/%3E%3C/svg%3E">

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useContext, useEffect, useMemo, useRef, useState } = React;

    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const mean = (arr) => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
    const sd = (arr) => {
      if (arr.length < 2) return 0;
      const m = arr.reduce((a, b) => a + b, 0) / arr.length;
      return Math.round(Math.sqrt(arr.reduce((a, b) => a + Math.pow(b - m, 2), 0) / (arr.length - 1)));
    };
    const now = () => performance.now();
    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
    const RESULTS_KEY = "cognitive-lab.results.v1";
    const FAVORITES_KEY = "cognitive-lab.favorites.v1";
    const THEME_KEY = "cognitive-lab.theme.v1";
    const TaskContext = React.createContext(null);

    function readStore(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch { return fallback; }
    }
    function writeStore(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
      window.dispatchEvent(new CustomEvent("lab-store", { detail: { key, value } }));
    }
    function useStoredState(key, fallback) {
      const [value, setValue] = useState(() => readStore(key, fallback));
      useEffect(() => {
        function sync(e) {
          if (e.type === "storage" && e.key !== key) return;
          if (e.type === "lab-store" && e.detail?.key !== key) return;
          setValue(readStore(key, fallback));
        }
        window.addEventListener("storage", sync);
        window.addEventListener("lab-store", sync);
        return () => { window.removeEventListener("storage", sync); window.removeEventListener("lab-store", sync); };
      }, [key]);
      function save(next) {
        setValue((old) => {
          const v = typeof next === "function" ? next(old) : next;
          writeStore(key, v);
          return v;
        });
      }
      return [value, save];
    }

    function taskEstimate(task) {
      if (!task) return "1–2 min";
      if (task.category === "Personality") return "3 min";
      if (task.category === "Memory") return "2–4 min";
      if (task.category === "Reaction Time & Vigilance") return "1–3 min";
      return "1–2 min";
    }
    function inputMode(instructions) {
      if (!instructions) return "keyboard / touch";
      const extractText = (node) => {
        if (!node) return "";
        if (typeof node === "string") return node;
        if (Array.isArray(node)) return node.map(extractText).join(" ");
        if (node?.props?.children) return extractText(node.props.children);
        return "";
      };
      const text = extractText(instructions).toLowerCase();
      if (text.includes("type")) return "typing";
      if (text.includes("click") || text.includes("tap")) return "tap / click";
      return "keyboard / touch";
    }
    function dateKey(value = new Date()) {
      const d = new Date(value);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }
    function daySeed(key = dateKey()) {
      return key.split("").reduce((s, c) => s + c.charCodeAt(0), 0);
    }
    function buildStreak(history) {
      const days = new Set(history.map((r) => dateKey(r.at)));
      let streak = 0;
      const cursor = new Date();
      while (days.has(dateKey(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }
      return streak;
    }
    function nodeText(node) {
      if (node == null || node === false) return "";
      if (typeof node === "string" || typeof node === "number") return String(node);
      if (Array.isArray(node)) return node.map(nodeText).join("");
      if (React.isValidElement(node)) return nodeText(node.props.children);
      return "";
    }
    function keyboardLabels(node) {
      const labels = [];
      function walk(value) {
        if (value == null || value === false) return;
        if (Array.isArray(value)) { value.forEach(walk); return; }
        if (!React.isValidElement(value)) return;
        const cls = String(value.props.className || "");
        if (cls.split(/\s+/).includes("kbd")) { labels.push(nodeText(value.props.children)); return; }
        walk(value.props.children);
      }
      walk(node);
      return labels;
    }
    function virtualKey(rawLabel) {
      const compact = String(rawLabel || "").replace(/\s+/g, "");
      const lower = compact.toLowerCase();
      if (!compact) return null;
      if (lower.includes("space")) return { label: "TAP", key: " ", code: "Space" };
      if (compact.includes("←") || compact.includes("←")) return { label: "←", key: "ArrowLeft", code: "ArrowLeft" };
      if (compact.includes("→") || compact.includes("→")) return { label: "→", key: "ArrowRight", code: "ArrowRight" };
      if (/^[a-z]$/i.test(compact)) return { label: compact.toUpperCase(), key: compact.toLowerCase(), code: `Key${compact.toUpperCase()}` };
      if (/^\d$/.test(compact)) return { label: compact, key: compact, code: `Digit${compact}` };
      return null;
    }
    function virtualKeys(instructions) {
      const controls = keyboardLabels(instructions)
        .flatMap((l) => String(l).split("/"))
        .map(virtualKey).filter(Boolean);
      const seen = new Set();
      return controls.filter((c) => { const id = `${c.key}:${c.code}`; if (seen.has(id)) return false; seen.add(id); return true; });
    }
    function pressVirtualKey(control) {
      window.dispatchEvent(new KeyboardEvent("keydown", { key: control.key, code: control.code, bubbles: true, cancelable: true }));
    }

    function TouchControls({ controls }) {
      if (!controls.length) return null;
      return (
        <div className="touch-controls" aria-label="on-screen controls">
          <span>touch controls</span>
          <div>
            {controls.map((c) => (
              <button
                type="button"
                key={`${c.key}-${c.code}`}
                onPointerDown={(e) => { e.preventDefault(); pressVirtualKey(c); }}
                onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pressVirtualKey(c); } }}
              >{c.label}</button>
            ))}
          </div>
        </div>
      );
    }

    function GameShell({ cite, instructions, phase, headline, explain, onBegin, onReset, children, footer, results, doneText, doneExtra }) {
      const task = useContext(TaskContext);
      const savedSignature = useRef("");
      const [shareState, setShareState] = useState("");
      const [practice, setPractice] = useState(false);
      const taskRuns = task ? readStore(RESULTS_KEY, []).filter((r) => r.taskId === task.id) : [];
      const resultSignature = phase === "done" && results ? JSON.stringify(results.map((r) => [r.label, String(r.value)])) : "";
      const controls = virtualKeys(instructions);

      async function shareResults() {
        if (!task || !results?.length) return;
        const resultText = results.map((r) => `${r.label}: ${r.value}`).join(", ");
        const text = `Cognitive Lab — ${task.title}: ${resultText}`;
        try {
          if (navigator.share) { await navigator.share({ title: `Cognitive Lab — ${task.title}`, text }); setShareState("shared!"); }
          else { await navigator.clipboard.writeText(text); setShareState("copied!"); }
        } catch { setShareState(""); }
        setTimeout(() => setShareState(""), 2000);
      }

      useEffect(() => {
        if (phase !== "done") { savedSignature.current = ""; return; }
        if (!task || !results?.length || !resultSignature || savedSignature.current === resultSignature) return;
        savedSignature.current = resultSignature;
        if (practice) return;
        const history = readStore(RESULTS_KEY, []);
        const entry = { id: `${task.id}-${Date.now()}`, taskId: task.id, title: task.title, category: task.category, cite, at: new Date().toISOString(), results: results.map((r) => ({ label: r.label, value: String(r.value) })) };
        writeStore(RESULTS_KEY, [entry, ...history].slice(0, 120));
      }, [phase, task?.id, resultSignature, practice]);

      if (phase === "intro") {
        return (
          <section className="game-shell">
            <div className="task-stage">
              <div className="task-card">
                <div className="task-meta">
                  <a href={`https://scholar.google.com/scholar?q=${encodeURIComponent(cite)}`} target="_blank" rel="noopener noreferrer" className="cite-link">{cite} ↗</a>
                </div>
                <h3 className="task-headline">{headline}</h3>
                <p className="task-explain">{explain}</p>
                {instructions && (
                  <div className="game-instructions" style={{ borderRadius: "10px", borderBottom: "1px solid", marginBottom: "18px" }}>
                    {instructions}
                  </div>
                )}
                {task && (
                  <div className="task-intro-meta">
                    <span><b>time</b>{taskEstimate(task)}</span>
                    <span><b>input</b>{inputMode(instructions)}</span>
                    <span><b>runs</b>{taskRuns.length}</span>
                    <span><b>domain</b>{task.category}</span>
                  </div>
                )}
                <button className="primary-btn" onClick={onBegin} style={{ width: "100%", marginTop: "8px", padding: "16px 24px", fontSize: "16px" }}>
                  Start Task →
                </button>
                <div className="practice-row">
                  <label className="practice-label">
                    <input type="checkbox" checked={practice} onChange={e => setPractice(e.target.checked)} />
                    Practice mode — results won't be saved
                  </label>
                </div>
              </div>
            </div>
            <div className="game-footer">{footer || "ready to begin"}</div>
          </section>
        );
      }

      if (phase === "done") {
        return (
          <section className="game-shell">
            <div className="task-stage">
              <div className="task-card task-results">
                <div className="task-meta">
                  <a href={`https://scholar.google.com/scholar?q=${encodeURIComponent(cite)}`} target="_blank" rel="noopener noreferrer" className="cite-link">{cite} ↗</a>
                </div>
                <h3 className="task-headline">your results</h3>
                {practice && <span className="practice-badge">Practice run — not saved</span>}
                <div className="result-grid">
                  {results.map((r) => (
                    <div className="result-tile" key={r.label}>
                      <span>{r.label}</span>
                      <strong>{r.value}</strong>
                    </div>
                  ))}
                </div>
                <p className="task-explain">{doneText}</p>
                {task && INTERPRETATIONS[task.id] && (
                  <div className="interpretation-box">
                    <div className="interpretation-label">what this means for you</div>
                    <p>{INTERPRETATIONS[task.id](results || [])}</p>
                  </div>
                )}
                {doneExtra}
                {(() => {
                  const prev = taskRuns[0];
                  if (!prev || !results?.length) return null;
                  const prevFirst = prev.results?.[0];
                  const currFirst = results[0];
                  if (!prevFirst || !currFirst || prevFirst.label !== currFirst.label) return null;
                  return (
                    <div className="compare-strip">
                      <span>vs last run</span>
                      <span className="compare-prev">{prevFirst.label}: {prevFirst.value}</span>
                      <span className="compare-arrow">→</span>
                      <span className="compare-curr">{currFirst.label}: {currFirst.value}</span>
                    </div>
                  );
                })()}
                {task && results?.length ? (
                  <div className="share-card">
                    <div>
                      <span>share result</span>
                      <strong>{task.title}</strong>
                      <small>{results.slice(0, 2).map((r) => `${r.label}: ${r.value}`).join(" · ")}</small>
                    </div>
                    <button className="mini-action" onClick={shareResults}>{shareState || "share"}</button>
                  </div>
                ) : null}
                <button className="ghost-btn" onClick={onReset} style={{ width: "100%", marginTop: "8px" }}>
                  Run again →
                </button>
              </div>
            </div>
            <div className="game-footer">{footer || "not a clinical instrument · for curiosity only"}</div>
          </section>
        );
      }

      return (
        <section className="game-shell">
          <div className="game-instructions">{instructions}</div>
          <div className="task-stage">
            {children}
            <TouchControls controls={controls} />
          </div>
          <div className="game-footer">{footer}</div>
        </section>
      );
    }

    function MiniBars({ values }) {
      const max = Math.max(1, ...values.map((v) => Math.abs(v.value)));
      return (
        <div className="mini-bars">
          {values.map((v) => (
            <div className="mini-bar" key={v.label}>
              <span>{v.label}</span>
              <i style={{ width: `${Math.max(8, Math.abs(v.value) / max * 100)}%` }}></i>
              <b>{v.value}</b>
            </div>
          ))}
        </div>
      );
    }

    window.TaskContext = TaskContext;
    window.LabStore = { RESULTS_KEY, FAVORITES_KEY, THEME_KEY, readStore, writeStore, useStoredState };
    window.TaskHelpers = { inputMode, taskEstimate };
    window.GameKit = { GameShell, MiniBars, rand, choice, mean, sd, now, shuffle, useEffect, useMemo, useRef, useState };
  </script>

  <script type="text/babel" src="games/stroop.jsx"></script>
  <script type="text/babel" src="games/nback.jsx"></script>
  <script type="text/babel" src="games/posner.jsx"></script>
  <script type="text/babel" src="games/gonogo.jsx"></script>

  <script type="text/babel" src="games/executive.jsx"></script>
  <script type="text/babel" src="games/perception.jsx"></script>
  <script type="text/babel" src="games/reaction.jsx"></script>
  <script type="text/babel" src="games/decision.jsx"></script>
  <script type="text/babel" src="games/language.jsx"></script>

  <script type="text/babel" src="games/meta.jsx"></script>

  <script type="text/babel">
    const roman = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX"];

    const CATEGORIES = [
      { name: "Attention", tasks: [
        { id: "stroop", title: "Stroop Test", cite: "Stroop, 1935", who: "John Ridley Stroop", measures: "selective attention · interference", desc: "Name the ink while the word tries to drag your tongue elsewhere.", history: <>A graduate student in Nashville, John Ridley Stroop noticed something strange: when colour words wore the wrong ink, fluent readers suddenly stumbled. He published the work in 1935, then left psychology for a quieter life teaching Bible studies, while his little <em>word-colour trap</em> became immortal.</>, C: () => <window.Stroop /> },
        { id: "posner", title: "Posner Cueing", cite: "Posner, 1980", who: "Michael Posner", measures: "covert attention · cue validity", desc: "Follow a cue without moving your eyes, then catch the target dot.", history: <>Michael Posner treated attention like a spotlight you could move without moving your head. In the late 1970s, he put arrows, boxes, and millisecond timing into a tidy theatre where the mind could be caught <em>leaning</em> before the body moved.</>, C: () => <window.PosnerCueing /> },
        { id: "flanker", title: "Flanker Task", cite: "Eriksen & Eriksen, 1974", who: "Barbara and Charles Eriksen", measures: "conflict · response inhibition", desc: "Read the middle arrow while its neighbors heckle from both sides.", history: <>The Eriksens compressed visual distraction into a row of arrows, a small typographic chorus with one soloist in the middle. Their task showed how even irrelevant neighbours can whisper into response selection before you quite notice.</>, C: () => <window.Flanker /> },
        { id: "visual-search", title: "Visual Search", cite: "Treisman & Gelade, 1980", who: "Anne Treisman", measures: "feature binding · search slope", desc: "Hunt for a red square as the crowd gets bigger and sneakier.", history: <>Anne Treisman was fascinated by the mind's habit of binding colour, shape, and place into objects. Her search displays turned perception into a busy marketplace, where a single feature pops out but a conjunction asks you to inspect the stalls.</>, C: () => <window.VisualSearch /> }
      ]},
      { name: "Memory", tasks: [
        { id: "nback", title: "N-Back", cite: "Kirchner, 1958", who: "Wayne Kirchner", measures: "working memory · updating", desc: "Track a stream of letters and catch the one that echoes N steps back.", history: <>Wayne Kirchner wanted a moving test of memory, not a still shelf of remembered items. His N-back makes you keep the present, discard the stale, and preserve one fragile thread of <em>just-before</em>.</>, C: () => <window.NBack /> },
        { id: "digit-span", title: "Digit Span", cite: "Jacobs, 1887", who: "Joseph Jacobs", measures: "short-term memory · span", desc: "Watch digits flash, then type them back as the line grows longer.", history: <>Joseph Jacobs studied memory with rows of digits and the patience of a Victorian psychophysicist. The result feels humble, almost schoolroom-simple, until the seventh digit arrives and the mind's little table is full.</>, C: () => <window.DigitSpan /> },
        { id: "corsi", title: "Corsi Block-Tapping", cite: "Corsi, 1972", who: "Philip Michael Corsi", measures: "visuospatial span", desc: "Blocks light up in space; click the route back from memory.", history: <>Philip Corsi built a memory task out of wooden blocks, turning space itself into a sequence. Instead of reciting numbers, participants had to remember a path, as if attention had left footprints on a tabletop.</>, C: () => <window.Corsi /> },
        { id: "sternberg", title: "Memory Scan", cite: "Sternberg, 1966", who: "Saul Sternberg", measures: "serial memory search · RT slope", desc: "Hold a tiny set in mind, then decide whether the probe belongs.", history: <>Saul Sternberg found drama in the slope of a line. By adding one more item to memory and watching response time rise, he made the hidden search of a remembered list visible in milliseconds.</>, C: () => <window.Sternberg /> },
        { id: "paired-associates", title: "Paired Associates", cite: "Calkins, 1894", who: "Mary Whiton Calkins", measures: "associative learning · recall", desc: "Learn odd word pairs, then supply the missing partner.", history: <>Mary Whiton Calkins invented paired-associate learning while running Wellesley's psychology lab. Harvard let her complete the work but refused her degree because she was a woman; she kept going anyway and became the first female president of the APA.</>, C: () => <window.PairedAssociates /> },
        { id: "simon", title: "Simon Memory", cite: "Sequential span · 1978", who: "Hasbro / Memory span research", measures: "sequence memory · recall span", desc: "Watch a growing pattern of coloured pads light up, then repeat it exactly.", history: <>The electronic Simon game (1978) put sequence memory in everyone's hands. Though named after J.R. Simon's spatial-compatibility research, the game itself measures what Jacobs measured with digits in 1887: the capacity to hold and reproduce an ordered series. How long a chain can you keep?</>, C: () => <window.Simon /> }
      ]},
      { name: "Executive Control", tasks: [
        { id: "gonogo", title: "Go/No-Go", cite: "Donders lineage, 1868", who: "Franciscus Donders", measures: "inhibition · commission errors", desc: "Respond to friendly letters; freeze when X appears.", history: <>Franciscus Donders asked how long a thought takes, then gave psychology permission to time the invisible. Go/No-Go descendants keep his chronometric spirit but add a little trap: sometimes the best action is restraint.</>, C: () => <window.GoNoGo /> },
        { id: "stop-signal", title: "Stop Signal", cite: "Logan & Cowan, 1984", who: "Gordon Logan", measures: "stopping latency · SSRT", desc: "Start a response, then cancel it when the signal suddenly changes.", history: <>Gordon Logan imagined action and inhibition as racers on a track: go wins unless stop catches it in time. The stop-signal task feels like a laboratory version of snatching your hand back from a hot pan.</>, C: () => <window.StopSignal /> },
        { id: "hanoi", title: "Tower of Hanoi", cite: "Édouard Lucas, 1883", who: "Édouard Lucas", measures: "planning · rule maintenance", desc: "Move three discs across pegs without ever placing a large disc on a small one.", history: <>Édouard Lucas wrapped a mathematical puzzle in a temple legend and gave planning researchers a durable toy. Three discs are enough to expose impatience; seven perfect moves are the quiet little staircase out.</>, C: () => <window.Hanoi /> },
        { id: "trail-making", title: "Trail Making A & B", cite: "Reitan, 1958", who: "Ralph Reitan", measures: "set shifting · visual scanning", desc: "Connect scattered nodes in order, then alternate numbers and letters.", history: <>Ralph Reitan brought battlefield-era neuropsychology into careful civilian testing. Trail Making looks like a child's dot puzzle until the alternating sequence turns it into a brisk test of mental gear changes.</>, C: () => <window.TrailMaking /> },
        { id: "task-switching", title: "Task Switching", cite: "Jersild, 1927", who: "Arthur Jersild", measures: "switch cost · cognitive flexibility", desc: "The cue changes the rule: answer colour now, shape next.", history: <>Arthur Jersild asked people to alternate mental operations and found a tax on switching. The task captures a familiar snag: the old rule keeps a hand on the door even after the new one walks in.</>, C: () => <window.TaskSwitch /> },
        { id: "wcst", title: "Wisconsin Card Sort", cite: "Berg, 1948", who: "Esta Berg", measures: "rule discovery · perseveration", desc: "Sort cards by a hidden rule that quietly changes after you learn it.", history: <>Esta Berg's card sorting test is a polite trick: it rewards discovery, then changes the world without announcing it. The interesting moment is not being wrong, but continuing to be wrong in the same way.</>, C: () => <window.WCST /> }
      ]},
      { name: "Perception", tasks: [
        { id: "rotation", title: "Mental Rotation", cite: "Shepard & Metzler, 1971", who: "Roger Shepard", measures: "spatial imagery · rotation slope", desc: "Decide whether two blocky forms match across rotation.", history: <>Roger Shepard and Jacqueline Metzler made people rotate objects in the mind's hand. Their jagged shapes suggested that imagery was not merely decorative; it could take measurable time to turn.</>, C: () => <window.MentalRotation /> },
        { id: "muller-lyyer", title: "Müller-Lyer", cite: "Müller-Lyer, 1889", who: "Franz Carl Müller-Lyer", measures: "size illusion · perceptual bias", desc: "Match two lines while arrowheads tug length out of proportion.", history: <>Franz Carl Müller-Lyer drew a deceptively small pair of arrowed lines and found a durable fracture between seeing and measuring. The illusion is a reminder that perception is an argument, not a ruler.</>, C: () => <window.MullerLyer /> },
        { id: "ebbinghaus", title: "Ebbinghaus", cite: "Ebbinghaus, 1902", who: "Hermann Ebbinghaus", measures: "contextual size illusion", desc: "Adjust a circle while its neighbors distort your sense of size.", history: <>Hermann Ebbinghaus is famous for forgetting curves, but his circles also made context visible. A centre dot seems to swell or shrink depending on its companions, which is a social pressure of another kind.</>, C: () => <window.Ebbinghaus /> },
        { id: "change-blindness", title: "Change Blindness", cite: "Rensink et al., 1997", who: "Ronald Rensink", measures: "visual awareness · change detection", desc: "Watch a flickering scene and click what has changed.", history: <>Ronald Rensink helped show that seeing a scene is not the same as keeping a perfect copy of it. With a blank flash between images, even obvious changes can hide in plain sight.</>, C: () => <window.ChangeBlindness /> },
        { id: "necker", title: "Necker Cube", cite: "Necker, 1832", who: "Louis Albert Necker", measures: "bistable perception · reversals", desc: "Click whenever the cube flips its orientation in your mind.", history: <>Louis Albert Necker noticed the ambiguous cube while studying crystals in Switzerland. A few ink lines became a small machine for watching perception change its mind without the world changing at all.</>, C: () => <window.Necker /> },
        { id: "mot", title: "Multiple Object Tracking", cite: "Pylyshyn & Storm, 1988", who: "Zenon Pylyshyn", measures: "divided attention · object tracking", desc: "Remember the highlighted dots as all of them start moving.", history: <>Zenon Pylyshyn treated attention like an indexing system for objects, not a smear of brightness. Multiple object tracking makes that idea physical: several dots wander, and your mind tries to keep tags tied to them.</>, C: () => <window.MOT /> },
        { id: "landmark", title: "Landmark Task", cite: "Harvey et al., 1995", who: "Harvey, Milner & Roberts", measures: "spatial bisection · pseudoneglect", desc: "Judge whether a bisecting mark sits left or right of a line's true centre.", history: <>Harvey and colleagues formalized Milner's landmark paradigm to probe spatial attention without a drawing response. The task revealed that healthy right-handers systematically misjudge bisection — favouring the left — a phenomenon called <em>pseudoneglect</em>.</>, C: () => <window.Landmark /> }
      ]},
      { name: "Reaction Time & Vigilance", tasks: [
        { id: "simple-rt", title: "Simple RT", cite: "Donders, 1868", who: "Franciscus Donders", measures: "motor latency · alerting", desc: "Wait for the field to change, then respond as fast as you can.", history: <>Donders used reaction time as a lantern for mental operations. The simple version is almost austere: nothing to choose, only the interval between the world's signal and your hand.</>, C: () => <window.SimpleRT /> },
        { id: "subitizing", title: "Subitizing", cite: "Kaufman et al., 1949", who: "Lloyd Kaufman", measures: "numerosity · counting slope", desc: "Dots flash briefly; report how many you saw.", history: <>Kaufman and colleagues gave a name to the little miracle of instantly knowing there are three things. Above four, the miracle thins out and counting starts leaving tracks in response time.</>, C: () => <window.Subitizing /> },
        { id: "pvt", title: "PVT", cite: "Dinges & Powell, 1985", who: "David Dinges", measures: "vigilance · lapses", desc: "Stay ready through unpredictable waits and catch the running counter.", history: <>David Dinges studied sleep loss with a task deliberately short on entertainment. The Psychomotor Vigilance Test is a small patience chamber where fatigue announces itself as delayed clicks and missed moments.</>, C: () => <window.PVT /> },
        { id: "tapping", title: "Tapping Regularity", cite: "Wing & Kristofferson, 1973", who: "Alan Wing", measures: "timing variability · ITI SD", desc: "Tap the spacebar at a steady rhythm of your own choosing.", history: <>Alan Wing and A. B. Kristofferson treated tapping as a window into internal clocks and motor noise. A finger on a key becomes a seismograph for rhythm.</>, C: () => <window.Tapping /> },
        { id: "subjective-time", title: "Subjective Time", cite: "Vierordt, 1868", who: "Karl von Vierordt", measures: "duration production · bias", desc: "Produce a target interval without counting out loud.", history: <>Karl von Vierordt measured time as people felt it rather than as clocks kept it. His work left a peculiar truth: short durations stretch, long ones compress, and the present is an elastic room.</>, C: () => <window.SubjectiveTime /> },
        { id: "beat-tap", title: "Beat Synchronisation", cite: "Repp, 2005", who: "Bruno Repp", measures: "sensorimotor synchrony", desc: "Tap with a metronome and watch your timing settle or wander.", history: <>Bruno Repp studied the tiny errors that happen when people tap with sound. Those errors are not just mistakes; they reveal how the nervous system predicts the next beat before it arrives.</>, C: () => <window.BeatTap /> }
      ]},
      { name: "Decision & Bias", tasks: [
        { id: "anchoring", title: "Anchoring", cite: "Tversky & Kahneman, 1974", who: "Amos Tversky", measures: "anchoring bias · adjustment", desc: "A random number nudges your estimate before you can pretend it didn't.", history: <>Amos Tversky and Daniel Kahneman loved simple questions with unsettling answers. Anchoring showed that even arbitrary numbers can leave fingerprints on estimates, like chalk dust on a sleeve.</>, C: () => <window.Anchoring /> },
        { id: "framing", title: "Framing", cite: "Tversky & Kahneman, 1981", who: "Daniel Kahneman", measures: "risk preference · framing", desc: "Choose a public-health plan under gain or loss wording.", history: <>Kahneman and Tversky made one dilemma wear two coats: lives saved or lives lost. The arithmetic stayed still, but preferences moved, exposing how wording can tilt the room.</>, C: () => <window.Framing /> },
        { id: "delay", title: "Delay Discounting", cite: "Mazur, 1987", who: "James Mazur", measures: "temporal discounting · k", desc: "Choose smaller money now or larger money later.", history: <>James Mazur gave impatience a curve. Delay discounting turns everyday tradeoffs into a series of quiet bargains with your future self.</>, C: () => <window.DelayDiscounting /> },
        { id: "iowa", title: "Iowa Gambling", cite: "Bechara et al., 1994", who: "Antoine Bechara", measures: "reward learning · risk", desc: "Pick from four decks and learn which generous-looking ones are costly.", history: <>Antoine Bechara and colleagues built a card game where bad decks smile early and punish later. It became a compact drama of reward, emotion, and learning from consequences.</>, C: () => <window.IowaGambling /> },
        { id: "linda", title: "Linda Problem", cite: "Tversky & Kahneman, 1983", who: "Amos Tversky", measures: "conjunction fallacy", desc: "Meet Linda, then choose the more probable statement.", history: <>Linda is fictional, but she has probably embarrassed more confident reasoners than many real people. Tversky and Kahneman used her vivid biography to show how representativeness can overpower probability.</>, C: () => <window.LindaProblem /> },
        { id: "crt", title: "Cognitive Reflection Test", cite: "Frederick, 2005", who: "Shane Frederick", measures: "reflection · intuitive traps", desc: "Three small riddles where the first answer is often the trap.", history: <>Shane Frederick's CRT has the air of a bar puzzle and the bite of a measuring tool. Its questions invite a fast answer, then reward the person who pauses long enough to mistrust fluency.</>, C: () => <window.CRT /> }
      ]},
      { name: "Language & Learning", tasks: [
        { id: "lexical", title: "Lexical Decision", cite: "Meyer & Schvaneveldt, 1971", who: "David Meyer", measures: "semantic priming · word recognition", desc: "Decide word or non-word after a prime nudges meaning.", history: <>David Meyer and Roger Schvaneveldt found that related words prepare one another like neighbours opening doors. DOCTOR can make NURSE arrive faster, which is semantic memory quietly warming up.</>, C: () => <window.LexicalDecision /> },
        { id: "mere-exposure", title: "Mere Exposure", cite: "Zajonc, 1968", who: "Robert Zajonc", measures: "familiarity · preference", desc: "See strange shapes at different frequencies, then rate what you like.", history: <>Robert Zajonc argued that liking can grow before reasons do. Mere exposure is the soft psychology of familiarity: a shape returns often enough and begins to feel like it belongs.</>, C: () => <window.MereExposure /> }
      ]},
      { name: "Social & Emotion", tasks: [
        { id: "asch", title: "Asch Lines", cite: "Asch, 1951", who: "Solomon Asch", measures: "conformity · social pressure", desc: "Judge line lengths after a room of prior answers points the wrong way.", history: <>Solomon Asch staged a social situation with lines so clear they seemed immune to doubt. Then a unanimous group chose wrongly, and many participants felt the strange heat of standing alone with the obvious.</>, C: () => <window.AschLines /> },
        { id: "iat", title: "Implicit Association", cite: "Greenwald et al., 1998", who: "Anthony Greenwald", measures: "association strength · D-score", desc: "Sort words and faces while category pairings change.", history: <>Anthony Greenwald, Debbie McGhee, and Jordan Schwartz made a sorting task that listens to speed. The IAT is controversial in interpretation, but historically important as a way to ask how associations move before reflection catches up.</>, C: () => <window.IAT /> },
        { id: "trolley", title: "Trolley Dilemmas", cite: "Foot, 1967", who: "Philippa Foot", measures: "moral judgment · action type", desc: "Answer four moral dilemmas and compare your pattern.", history: <>Philippa Foot, an Oxford philosopher and granddaughter of U.S. President Grover Cleveland, invented the trolley problem while thinking about double effect. A runaway trolley became philosophy's most durable little machine for moral unease.</>, C: () => <window.Trolley /> },
        { id: "ultimatum", title: "Ultimatum Game", cite: "Güth et al., 1982", who: "Werner Güth", measures: "fairness · rejection threshold", desc: "Accept or reject splits of ten dollars from a computer partner.", history: <>Werner Güth's bargaining game made fairness costly. People often reject unfair money, a small rebellion against the tidy prediction that any gain should be accepted.</>, C: () => <window.Ultimatum /> },
        { id: "emotion", title: "Emotion Recognition", cite: "Ekman & Friesen, 1976", who: "Paul Ekman", measures: "facial affect labeling", desc: "Read stylized faces and choose the emotion.", history: <>Paul Ekman carried photographs across cultures and argued that some emotional expressions travel widely. The faces here are only sketches, but they keep the old question alive: what can a face say before words arrive?</>, C: () => <window.EmotionRecog /> },
        { id: "marshmallow", title: "Marshmallow Test", cite: "Mischel, 1972", who: "Walter Mischel", measures: "delay of gratification", desc: "Take the small reward now, or wait for the larger one.", history: <>Walter Mischel's preschoolers sat with treats and an impossible instruction: wait. Later debate softened the myth around the test, but the original scenes remain vivid little portraits of temptation and strategy.</>, C: () => <window.Marshmallow /> }
      ]},
      { name: "Personality", tasks: [
        { id: "big-five", title: "Big Five (BFI-10)", cite: "Rammstedt & John, 2007", who: "Beatrice Rammstedt", measures: "OCEAN traits · self-report", desc: "Ten statements sketch the five-factor personality model.", history: <>Beatrice Rammstedt and Oliver John compressed a broad personality inventory into ten brisk items. It is not a diagnosis, just a thumbnail portrait in five old dimensions: openness, conscientiousness, extraversion, agreeableness, and neuroticism.</>, C: () => <window.BigFive /> }
      ]}
    ];

    const taskCount = CATEGORIES.reduce((s, c) => s + c.tasks.length, 0);
    const allTasks = CATEGORIES.flatMap((cat, ci) => cat.tasks.map((task, ti) => ({ ...task, category: cat.name, ci, ti, number: `${roman[ci]}.${ti + 1}` })));

    const CATEGORY_VISUALS = {
      "Attention":               { icon: "AT", accent: "#0284C7" },
      "Memory":                  { icon: "WM", accent: "#2563EB" },
      "Executive Control":       { icon: "EX", accent: "#4F46E5" },
      "Perception":              { icon: "PX", accent: "#0891B2" },
      "Reaction Time & Vigilance": { icon: "RT", accent: "#DC2626" },
      "Decision & Bias":         { icon: "DB", accent: "#D97706" },
      "Language & Learning":     { icon: "LL", accent: "#059669" },
      "Social & Emotion":        { icon: "SE", accent: "#DB2777" },
      "Personality":             { icon: "BF", accent: "#7C3AED" }
    };
    function categoryVisual(name, fi = 0) {
      return CATEGORY_VISUALS[name] || { icon: roman[fi] || "CL", accent: "#2563EB" };
    }

    const THEMES = [
      { id: "powder", name: "Default",     swatch: "#2563EB" },
      { id: "sky",    name: "Sky Blue",    swatch: "#0284C7" },
      { id: "ice",    name: "Cyan",        swatch: "#0891B2" },
      { id: "periwinkle", name: "Indigo",  swatch: "#4F46E5" }
    ];

    const BATTERIES = [
      { id: "attention-check", name: "Attention Check", icon: "AT", tasks: ["flanker", "gonogo", "visual-search"], desc: "3 tasks · ~5 min" },
      { id: "memory-suite", name: "Memory Suite", icon: "WM", tasks: ["digit-span", "corsi", "nback"], desc: "3 tasks · ~8 min" },
      { id: "executive-pack", name: "Executive Pack", icon: "EX", tasks: ["stop-signal", "task-switching", "wcst"], desc: "3 tasks · ~6 min" },
      { id: "5-min-screen", name: "5-Min Screen", icon: "⚡", tasks: ["simple-rt", "stroop", "gonogo"], desc: "3 tasks · ~5 min" },
      { id: "decision-biases", name: "Decision Biases", icon: "DB", tasks: ["anchoring", "framing", "delay"], desc: "3 tasks · ~4 min" },
    ];

    const INTERPRETATIONS = {
      "stroop": (r) => {
        const d = parseInt(r.find(x=>x.label==="delta")?.value)||0;
        return d<40?"Very low interference — word meanings barely slowed you down. Strong focused attention.":d<120?"Typical Stroop effect — the word meaning tugged at your answer slightly. Normal for most people.":"Strong interference — the word competed hard with the ink colour. This is common for fast readers.";
      },
      "gonogo": (r) => {
        const c = parseInt(r.find(x=>x.label==="commissions")?.value)||0;
        return c===0?"Perfect inhibition — you never responded when you should have held back. Excellent self-control.":c<=2?"Good inhibition — just "+c+" slip"+( c>1?"s":"")+" on 30 trials is well within the normal range.":""+c+" commission errors on 30 trials suggests impulse control was challenging this run. This is normal under time pressure.";
      },
      "stop-signal": (r) => {
        const ssrt = parseInt(r.find(x=>x.label==="SSRT")?.value)||0;
        return ssrt<180?"Very fast stopping — your brain cancelled actions in around "+ssrt+" ms. That's quicker than most.":ssrt<280?"Typical SSRT. It takes most adults 200–250 ms to cancel a movement already in progress.":"Your stopping time was "+ssrt+" ms. Longer SSRTs are common when the go response is very fast or the stop signal arrives late.";
      },
      "hanoi": (r) => {
        const m = parseInt(r.find(x=>x.label==="moves")?.value)||0;
        return m===7?"Perfect — solved in exactly 7 moves! Optimal planning from start to finish.":m<=10?"Solved in "+m+" moves, close to the 7-move optimum. Good planning ahead.":"Solved in "+m+" moves. The optimal path is 7 — extra moves show where planning broke down and a disc had to backtrack.";
      },
      "trail-making": (r) => {
        const t = parseInt(r.find(x=>x.label==="time")?.value)||0;
        const m = r.find(x=>x.label==="mode")?.value||"A";
        return m==="B"?"Mode B completed in "+t+"s. Alternating numbers and letters taxes set-shifting — under 90s is good, under 60s is fast.":"Mode A completed in "+t+"s. Purely sequential; it mainly measures visual scanning speed.";
      },
      "task-switching": (r) => {
        const cost = parseInt(r.find(x=>x.label==="switch cost")?.value)||0;
        return cost<50?"Minimal switch cost ("+cost+" ms) — you shifted rules quickly with little mental overhead.":cost<150?"Typical switch cost ("+cost+" ms). Everyone pays a small delay when the task rule changes.":"Large switch cost ("+cost+" ms). Disengaging one rule and loading another took extra time — common under cognitive load.";
      },
      "wcst": (r) => {
        const p = parseInt(r.find(x=>x.label==="perseverative")?.value)||0;
        return p===0?"No perseverative errors — you adapted immediately each time the rule changed. Excellent flexibility.":p<=3?""+p+" perseverative error"+(p>1?"s":"")+". A small amount of rule-sticking is normal when the feedback is silent.":""+p+" perseverative errors. Continuing with the old rule after it changed is called perseveration — it's the most informative result from this task.";
      },
      "rotation": (r) => {
        const acc = parseInt(r.find(x=>x.label==="accuracy")?.value)||0;
        return acc>=90?"Very accurate spatial rotation ("+acc+"%). You can vividly manipulate shapes in your mind.":acc>=70?"Good accuracy ("+acc+"%). Mental rotation is harder at larger angles — typical performance.":"Accuracy of "+acc+"% suggests rotation was challenging. This is common and does not reflect general intelligence.";
      },
      "nback": (r) => {
        const h = parseInt(r.find(x=>x.label==="hits")?.value)||0, miss = parseInt(r.find(x=>x.label==="misses")?.value)||0, fa = parseInt(r.find(x=>x.label==="false alarms")?.value)||0;
        return (miss+fa===0)?"No misses and no false alarms — perfect working memory performance!":miss>fa?"More misses than false alarms — you were conservative. You may have been too strict about what counted as a match.":fa>miss?"More false alarms than misses — you were liberal. You responded to some non-matches, which means the N-back position was sometimes confused.":"Balanced errors ("+miss+" misses, "+fa+" false alarms). Working memory updating is difficult — this is a genuinely hard task.";
      },
      "simple-rt": (r) => {
        const rt = parseInt(r.find(x=>x.label==="mean RT")?.value)||0;
        return rt<200?"Exceptionally fast ("+rt+" ms). Top-end simple reaction speed.":rt<280?"Typical reaction speed ("+rt+" ms). Most adults fall between 200–280 ms for simple RT.":"Slower reaction time ("+rt+" ms). Fatigue, distraction, or late responses can all inflate this.";
      },
      "pvt": (r) => {
        const lapses = parseInt(r.find(x=>x.label==="lapses >500")?.value)||0;
        return lapses===0?"No lapses — sustained attention was solid throughout the task.":lapses<=2?""+lapses+" lapse"+(lapses>1?"s":"")+". Occasional slowdowns are normal, especially in a short session.":""+lapses+" lapses over 500 ms. This may reflect fatigue or a wandering mind. Getting enough sleep dramatically reduces lapses.";
      },
      "simon": (r) => {
        const lv = parseInt(r.find(x=>x.label==="level reached")?.value)||0;
        return lv<=4?"Reached level "+lv+". Short-term sequence memory spans vary widely. Practising pattern tasks can help.":lv<=8?"Level "+lv+" — solid sequence memory. Most adults reliably reach 5–7 before errors appear.":"Impressive — level "+lv+"! Sequence memory this long requires focused attention and minimal distraction.";
      },
      "digit-span": (r) => {
        const span = parseInt(r.find(x=>x.label==="best span")?.value)||0;
        return span<=4?"A span of "+span+" is on the lower end. Verbal working memory capacity varies — grouping digits into chunks can help.":span<=7?"Span of "+span+" — right in the typical adult range (5–9). George Miller's famous '7±2' describes exactly this.":"Span of "+span+" is above average. Long verbal spans are linked to strong language working memory.";
      },
      "corsi": (r) => {
        const span = parseInt(r.find(x=>x.label==="best span")?.value)||0;
        return "Spatial span of "+span+". Corsi spans average 5–6 for most adults. Visuospatial memory is separate from verbal memory — your score here may differ from digit span.";
      },
      "sternberg": (r) => {
        const rt = parseInt(r.find(x=>x.label==="mean RT")?.value)||0;
        return "Mean scan RT of "+rt+" ms. Sternberg's key result is that RT rises with set size — if large sets were much slower than small ones, serial memory scanning is happening.";
      },
      "paired-associates": (r) => {
        const score = r.find(x=>x.label==="recalled")?.value||"0/6";
        const n = parseInt(score)||0;
        return n>=5?"Excellent recall ("+score+"). Forming odd word-pair associations quickly is a sign of flexible encoding.":n>=3?"Good recall ("+score+") for six arbitrary word pairs seen briefly.":""+score+" recalled. Paired associate learning is genuinely hard with unrelated words — repetition and imagery help.";
      },
      "landmark": (r) => {
        const bias = r.find(x=>x.label==="response bias")?.value||"neutral";
        return bias==="left bias"?"Left bias detected — you tended to judge the mark as right of centre, which means your perception leans left. This is called pseudoneglect and is the typical pattern for healthy right-handers.":bias==="right bias"?"Right bias detected. Less common than left bias. Your right hemisphere may be slightly less dominant for spatial attention.":"Neutral spatial bias — your bisection judgments were centred with no systematic lean.";
      },
      "muller-lyyer": (r) => {
        const bias = parseInt(r.find(x=>x.label==="bias")?.value)||0;
        return Math.abs(bias)<10?"Almost no illusion bias — you were very accurate despite the arrowheads.":bias>0?"The illusion made the line seem "+bias+"px longer than it was. Arrow fins pointing outward inflated perceived length.":"The illusion made the line seem "+Math.abs(bias)+"px shorter. Arrow fins pointing inward compressed perceived length.";
      },
      "ebbinghaus": (r) => {
        const bias = parseInt(r.find(x=>x.label==="bias")?.value)||0;
        return Math.abs(bias)<4?"Very little context bias — you judged size accurately despite surrounding rings.":bias>0?"You matched "+bias+"px larger than the target — the small surrounding rings made the centre appear bigger.":"You matched "+Math.abs(bias)+"px smaller — the large surrounding rings made the centre appear smaller.";
      },
      "change-blindness": (r) => {
        const found = r.find(x=>x.label==="found")?.value;
        const t = parseInt(r.find(x=>x.label==="time")?.value)||0;
        return found==="yes"?"Found the change in "+t+" ms. The flicker disrupts attention indexing — spotting it quickly means attention landed on the right region early.":"Did not find the change. This is extremely common — change blindness affects almost everyone when a blank flash interrupts the scene.";
      },
      "necker": (r) => {
        const rate = parseInt(r.find(x=>x.label==="rate")?.value)||0;
        return rate<4?"Low flip rate ("+rate+"/min). Some people hold one percept very stably — this is normal.":rate<12?"Moderate flip rate ("+rate+"/min). Bistable perception varies widely between individuals and even day-to-day.":"High flip rate ("+rate+"/min). Rapid switching between percepts is associated with high perceptual flexibility.";
      },
      "mot": (r) => {
        const c = r.find(x=>x.label==="correct")?.value||"0/4";
        const n = parseInt(c)||0;
        return n===4?"All 4 targets found — excellent divided attention and object tracking.":n>=2?""+c+" targets found. Multi-object tracking is genuinely hard — performance typically drops as dots speed up.":""+c+" targets found. MOT requires sustained divided attention across the full 9.5 seconds — losing track is common.";
      },
      "anchoring": (r) => {
        return "Compare your estimate to what you'd guess with the other anchor. Studies show high anchors pull estimates up and low anchors pull estimates down, even when people know the anchor is random.";
      },
      "framing": (r) => {
        const frame = r.find(x=>x.label==="frame")?.value||"";
        const choice = r.find(x=>x.label==="choice")?.value||"";
        return "You saw the "+frame+" and chose "+choice+". Most people prefer sure options in gain frames and risky options in loss frames. If your choice matched this pattern, framing influenced you.";
      },
      "delay": (r) => {
        const later = parseInt(r.find(x=>x.label==="later choices")?.value)||0;
        return later>=7?"You chose the larger-later option "+later+"/10 times — low discounting rate. You're comfortable waiting for bigger rewards.":later>=4?"Mixed preferences ("+later+"/10 later). A balanced discounting rate.":"You preferred smaller-sooner "+( 10-later)+"/10 times — steep discounting. Immediate rewards are strongly preferred, which is common.";
      },
      "iowa": (r) => {
        const good = parseInt(r.find(x=>x.label==="good decks")?.value)||0;
        return good>=40?"Mostly good decks (C and D) — "+good+" of 60 draws. Your decision-making learned the pattern from feedback.":good>=25?"Mixed strategy — "+good+"/60 from the safer decks. Some learning from experience is present.":"Fewer than "+good+" draws from the good decks. The risky decks (A and B) stayed attractive despite losses — this mimics the pattern seen in some decision-making research.";
      },
      "flanker": (r) => {
        const cost = parseInt(r.find(x=>x.label==="cost")?.value)||0;
        return cost<30?"Minimal flanker cost ("+cost+" ms) — surrounding arrows barely distracted you. Strong selective attention.":cost<80?"Typical flanker effect ("+cost+" ms). Irrelevant flankers always enter the response system a little.":"Strong flanker interference ("+cost+" ms). The surrounding arrows significantly competed with the centre target.";
      },
      "visual-search": (r) => {
        const rt = parseInt(r.find(x=>x.label==="mean search")?.value)||0;
        return "Mean search time "+rt+" ms. If large-set trials were much slower, you searched serially (one item at a time). A flat RT-by-set-size curve would suggest pop-out, but a red square among mixed distractors usually requires serial search.";
      },
      "lexical": (r) => {
        const rel = parseInt(r.find(x=>x.label==="related")?.value)||0, unrel = parseInt(r.find(x=>x.label==="unrelated")?.value)||0;
        const diff = rel-unrel;
        return diff<-20?"Related primes sped responses by about "+Math.abs(diff)+" ms — semantic priming is visible in your data.":diff<20?"Little difference between related and unrelated. With only 8 items, the priming effect can be hidden by noise.":"Unrelated primes were actually faster ("+Math.abs(diff)+" ms). This can happen with very small samples.";
      },
      "mere-exposure": (r) => {
        const hi = parseFloat(r.find(x=>x.label==="freq 25")?.value)||0, lo = parseFloat(r.find(x=>x.label==="freq 1")?.value)||0;
        return hi>lo?"You rated the most-seen shape "+hi.toFixed(1)+" vs "+lo.toFixed(1)+" for the least-seen — a textbook mere exposure effect.":hi===lo?"No exposure effect in your ratings. With only 4 shapes and a short study phase, this can happen by chance.":"You rated the rarer shape higher — the reverse of the typical pattern. Novelty preference sometimes overrides familiarity.";
      },
      "asch": (r) => {
        const c = parseInt(r.find(x=>x.label==="conformity")?.value)||0;
        return c===0?"No conformity — you held your own judgment on every round, even under group pressure.":c<=2?""+c+" conformity response"+(c>1?"s":"")+". Occasional social influence is universal; none of us are fully immune.":""+c+" conformity responses. Heavy social pressure, especially when unanimous, moves most people's public answers.";
      },
      "iat": (r) => {
        const d = parseFloat(r.find(x=>x.label==="D sketch")?.value)||0;
        return Math.abs(d)<0.2?"Near-zero D sketch — little evidence of implicit association difference in this run. Note: this toy version is not diagnostically valid.":d>0?"Positive D sketch ("+d.toFixed(2)+") — Block 1 pairing was faster. This demo is illustrative only; real IAT interpretation requires hundreds of trials.":"Negative D sketch ("+d.toFixed(2)+") — Block 2 pairing was faster. Again, treat this as a curiosity, not a diagnostic.";
      },
      "trolley": (r) => {
        const yes = parseInt(r.find(x=>x.label==="yes")?.value)||0;
        return yes>=3?"Mostly utilitarian ("+yes+"/4 yes). You tended to endorse harmful acts when they saved more lives overall.":yes===2?"Mixed moral intuitions (2/4 yes). You were sensitive to specific factors — perhaps direct contact or intention changed your answer.":"More deontological ("+yes+"/4 yes). You often refused harmful acts even when they'd save more lives — the action itself mattered, not just the outcome.";
      },
      "ultimatum": (r) => {
        const acc = parseInt(r.find(x=>x.label==="accepted")?.value)||0;
        return acc>=4?"You accepted most offers — low rejection threshold. You prioritised earning over fairness.":acc>=2?"Mixed responses — you accepted some but rejected unfair splits. A fairness threshold is visible.":"Low acceptance ("+acc+"/5). You rejected many offers, even at a personal cost. Strong fairness sensitivity.";
      },
      "emotion": (r) => {
        const score = r.find(x=>x.label==="score")?.value||"0/6";
        const n = parseInt(score)||0;
        return n>=5?"Excellent emotion recognition ("+score+"). Reading stylised faces accurately suggests strong social-perceptual skill.":n>=3?""+score+" — a reasonable score for stylised SVG faces, which lack the fine-grained cues of real photos.":""+score+". Stylised faces are harder to read than photos. Consistent errors on specific expressions are the interesting signal.";
      },
      "marshmallow": (r) => {
        const waited = parseInt(r.find(x=>x.label==="waited")?.value)||0;
        const choice = r.find(x=>x.label==="choice")?.value||"";
        return choice==="waited"?"You waited the full 60 seconds and earned $2. Sustained delay of gratification — modern research suggests this reflects strategy as much as 'willpower'.":waited>30?"You waited "+waited+" seconds before taking the smaller reward. That's substantial patience.":waited>0?"You waited "+waited+" seconds — the immediate reward was hard to resist. This is entirely normal.":"You took $1 immediately. Choosing the sure thing has strategic merit — context matters enormously in real delay tasks.";
      },
      "linda": (r) => {
        const choice = r.find(x=>x.label==="choice")?.value||"";
        return choice==="both"?"You chose 'bank teller and feminist' — this is the conjunction fallacy. A conjunction can never be more probable than one of its parts, however vivid the story.":"You chose 'bank teller' — the normatively correct answer. You avoided the conjunction fallacy, which most people fall into on first exposure.";
      },
      "crt": (r) => {
        const score = parseInt(r.find(x=>x.label==="score")?.value)||0;
        return score===3?"3/3 — you caught all three intuitive lures and reasoned through them. High reflective thinking score.":score===2?"2/3 — you resisted most intuitive traps. One slipped through, which happens even to careful thinkers.":score===1?"1/3 — one question got a deliberate answer. The others had strong intuitive pulls that overrode reflection.":"0/3 — the intuitive answers felt right on all three. CRT measures a habit, not intelligence — it's trainable.";
      },
      "big-five": (r) => {
        return "Your Big Five sketch: O=openness, C=conscientiousness, E=extraversion, A=agreeableness, N=neuroticism. All combinations are normal. This 10-item version is a rough thumbnail — for a real assessment, see validated questionnaires like the BFI-44.";
      },
      "beat-tap": (r) => {
        const sd_val = parseInt(r.find(x=>x.label==="ITI SD")?.value)||0;
        return sd_val<30?"Very consistent tapping (SD "+sd_val+" ms) — your internal timer is tight and synchronisation was strong.":sd_val<70?"Typical tapping variability (SD "+sd_val+" ms). Some drift around the beat is universal.":"High variability (SD "+sd_val+" ms). Synchronising to an external beat is harder than it feels — motor noise accumulates.";
      },
      "subjective-time": (r) => {
        const err = parseFloat(r.find(x=>x.label==="error")?.value)||0;
        return Math.abs(err)<1?"Near-perfect time production — your subjective clock matched the target closely.":err>0?"You overproduced by "+err.toFixed(1)+"s — your internal clock ran slow (the interval felt shorter than it was).":"You underproduced by "+Math.abs(err).toFixed(1)+"s — your internal clock ran fast (the interval felt longer than it was).";
      },
      "tapping": (r) => {
        const sd_val = parseInt(r.find(x=>x.label==="ITI SD")?.value)||0;
        return sd_val<20?"Very stable rhythm (SD "+sd_val+" ms). Your motor system produced a tight internal clock.":sd_val<50?"Moderate variability (SD "+sd_val+" ms) — typical for self-paced tapping.":"High variability (SD "+sd_val+" ms). Self-paced tapping without an external beat accumulates more motor noise.";
      },
      "subitizing": (r) => {
        const small = parseInt(r.find(x=>x.label==="1-4 RT")?.value)||0, large = parseInt(r.find(x=>x.label==="5-9 RT")?.value)||0;
        return large>small+200?"Clear subitizing gap — small sets were "+(large-small)+" ms faster. Sets of 1–4 were 'seen' instantly; larger sets required counting.":large>small?"Some speed difference between small and large sets, but smaller than typical. Your counting range may start earlier.":"Little difference between small and large dot sets. You may be very fast at counting, or the 220 ms exposure limited subitizing.";
      },
      "posner": (r) => {
        return "Posner cueing measures how attention orients to cued locations. Valid cues speed responses; invalid cues slow them — the difference is the cueing benefit.";
      },
    };

    function formatDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" });

      return entry?.results?.[0] ? `${entry.results[0].label}: ${entry.results[0].value}` : "saved";
    }
    function buildAchievements(history, favorites) {
      const completed = new Set(history.map((r) => r.taskId));
      const domains = new Set(history.map((r) => r.category));
      return [
        { name: "First Run",       detail: "complete one task",  icon: "01", earned: history.length >= 1 },
        { name: "Explorer",        detail: "finish 5 tasks",     icon: "05", earned: completed.size >= 5 },
        { name: "Broad Sampler",   detail: "try 5 domains",      icon: "IX", earned: domains.size >= 5 },
        { name: "Repeat Scientist",detail: "save 10 runs",       icon: "10", earned: history.length >= 10 },
        { name: "Curator",         detail: "favourite 3 tasks",  icon: "FV", earned: favorites.length >= 3 },
        { name: "Daily Return",    detail: "2-day streak",       icon: "ST", earned: buildStreak(history) >= 2 }

    function CursorField() {
      const [points, setPoints] = useState([]);
      function move(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const next = { x: e.clientX - rect.left, y: e.clientY - rect.top, t: Date.now() };
        setPoints((old) => [next, ...old].slice(0, 10));
      }
      return (
        <div className="cursor-field" onMouseMove={move} onMouseLeave={() => setPoints([])}>
          <span>move through the field</span>
          {points.map((p, i) => (
            <i key={`${p.t}-${i}`} style={{ left: p.x, top: p.y, opacity: 1 - i / 11, transform: `translate(-50%, -50%) scale(${1 - i * 0.06})` }}></i>
          ))}
        </div>
      );
    }

      }, [activeId]);
      useEffect(() => {

        const obs = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (!e.isIntersecting) return; e.target.classList.add("is-visible"); obs.unobserve(e.target); });
        }, { threshold: 0.1, rootMargin: "0px 0px -32px 0px" });

        return () => obs.disconnect();
      }, [activeId, historyRows.length, favorites.length, theme]);

                            <small>{getPrimaryResult(row)}</small>
                          </button>
                        )) : <p className="empty-note">Complete a task and your runs will appear here.</p>}
                      </div>
                      <div className="dashboard-card badges-card">
                        <div className="dashboard-label">Badges</div>
                        <div className="badge-list">
                          {achievementRows.map((badge, i) => (
                            <span className={badge.earned ? "badge earned" : "badge"} key={badge.name} style={{ animationDelay: `${i * 60}ms` }}>
                              <i>{badge.icon}</i>
                              <b>{badge.name}</b>
                              <small>{badge.detail}</small>
                            </span>
                          ))}
                        </div>
                      </div>
                    </section>

                    <div className="dashboard-card reveal-section" style={{ marginBottom: "20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "18px" }}>
                      <div>
                        <div className="dashboard-label">Theme</div>
                        <div className="theme-switcher">
                          {THEMES.map((t) => (
                            <button className={theme === t.id ? "active" : ""} key={t.id} onClick={() => setTheme(t.id)}>
                              <i style={{ background: t.swatch }}></i>{t.name}
                            </button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <div className="dashboard-label">About</div>
                        <p style={{ fontSize: "13px", color: "var(--text-3)", lineHeight: "1.6", marginTop: "8px" }}>
                          Cognitive Lab is a collection of 51 classical psychology tasks. Results are saved locally and never uploaded. Not a clinical instrument — for curiosity and learning only.
                        </p>
                      </div>
                    </div>

                    {CATEGORIES.map((cat) => {
                      const ci = CATEGORIES.findIndex((c) => c.name === cat.name);
                      return (
                        <section className="category-block reveal-section" key={cat.name} style={{ "--accent": categoryVisual(cat.name, ci).accent }}>
                          <div className="category-label">
                            <span>{categoryVisual(cat.name, ci).icon}</span>
                            <strong>{cat.name}</strong>
                            <i></i>
                            <b>{cat.tasks.length}</b>
                          </div>
                          <div className="card-grid">
                            {cat.tasks.map((task) => {
                              const ti = CATEGORIES[ci].tasks.findIndex((t) => t.id === task.id);
                              return (
                                <article
                                  className={completedIds.has(task.id) ? "game-card completed" : "game-card"}
                                  key={task.id}
                                  style={{ "--accent": categoryVisual(cat.name, ci).accent }}
                                  onClick={() => chooseTask(task.id)}
                                  role="button"
                                  tabIndex="0"
                                  onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") chooseTask(task.id); }}
                                >
                                  <button
                                    className={favoriteSet.has(task.id) ? "favorite-btn active" : "favorite-btn"}
                                    onClick={(e) => toggleFavorite(task.id, e)}
                                    aria-label={favoriteSet.has(task.id) ? "remove from favorites" : "add to favorites"}
                                  >{favoriteSet.has(task.id) ? "★" : "+"}</button>
                                  <span className="card-icon">{categoryVisual(cat.name, ci).icon}</span>
                                  <span className="card-index">№ {roman[ci]}.{ti + 1}</span>
                                  <strong>{task.title}</strong>
                                  <em>{task.cite}</em>
                                  <p>{task.desc}</p>
                                  <small>{task.measures}</small>
                                </article>
                              );
                            })}
                          </div>
                        </section>
                      );
                    })}

                    <section className="lab-atmosphere reveal-section">
                      <CursorField />
                      <Ticker />
                    </section>
                    <footer className="home-footer">Not a clinical instrument · For curiosity only</footer>
                  </>
                ) : (
                  <>
                    <div className="task-breadcrumb">
                      <button onClick={goHome} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer", padding: 0, fontFamily: "inherit", fontSize: "inherit", letterSpacing: "inherit", textTransform: "inherit" }}>
                        the lab
                      </button>
                      {" / "}{roman[activeTask.ci]}. {activeTask.category}{" / "}{activeTask.title}
                    </div>
                    <section className="task-headbar">
                      <h2>{activeTask.title}</h2>
                      <div className="citebox">
                        <strong>{activeTask.cite}</strong>
                        <span>measures · {activeTask.measures}</span>
                        <button
                          className={favoriteSet.has(activeTask.id) ? "favorite-wide active" : "favorite-wide"}
                          onClick={(e) => toggleFavorite(activeTask.id, e)}
                        >{favoriteSet.has(activeTask.id) ? "★ Favorited" : "+ Add Favorite"}</button>
                      </div>
                    </section>
                    <section className="history-block">
                      <h3><i></i>The Story · {activeTask.who}</h3>
                      <p>{activeTask.history}</p>
                    </section>
                    <section className="task-info-panel">
                      <div>
                        <span>about this task</span>
                        <p>{activeTask.desc}</p>
                      </div>
                      <dl>
                        <div><dt>domain</dt><dd>{activeTask.category}</dd></div>
                        <div><dt>estimate</dt><dd>{window.TaskHelpers.taskEstimate(activeTask)}</dd></div>
                        <div><dt>saved runs</dt><dd>{activeTaskRuns.length}</dd></div>
                        <div><dt>latest</dt><dd>{formatDate(activeTaskRuns[0]?.at)}</dd></div>
                      </dl>
                    </section>
                    <window.TaskContext.Provider value={activeTask}>
                      <activeTask.C />
                    </window.TaskContext.Provider>
                    {activeBattery && (
                      <div className="battery-next-strip">
                        <span>Battery: <strong>{activeBattery.name}</strong> · {activeBattery.tasks.indexOf(activeId)+1}/{activeBattery.tasks.length}</span>
                        {batteryNextId ? (
                          <button className="primary-btn" style={{padding:"8px 16px",fontSize:"14px"}} onClick={() => chooseTask(batteryNextId)}>
                            Next →
                          </button>
                        ) : (
                          <button className="ghost-btn" style={{padding:"8px 16px",fontSize:"14px",marginLeft:"auto"}} onClick={() => { setBatteryId(null); goHome(); }}>
                            Finish battery
                          </button>
                        )}
                      </div>
                    )}
                  </>
                )}
              </div>
            </main>

            {!activeTask && showStickyStart && (
              <button className="sticky-start-btn" onClick={() => chooseTask(recommendedTask.id)}>
                <span>start a task</span>
                <strong>{recommendedTask.title}</strong>
              </button>
            )}

            <BottomNav
              activeView={bnav_view}
              goHome={goHome}
              openTasks={() => setMobileOpen(true)}
            />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
